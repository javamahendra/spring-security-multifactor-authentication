spring:
  application:
    name: multifactor-authentication
  # Database configurations
  datasource:
    url: jdbc:mysql://localhost:3306/google_mfa
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: localhost
      port: 6379
  session:
    redis:
      namespace: spring:session
      flush-mode: on_save

server:
  servlet:
    session:
      timeout: 30m

#JWT Token Configuration
jwt:
  secret: 
  issuer: learnwithiftekhar.com
  expiration: 3600000 # 1 hour in milliseconds
  refreshExpiration: 604800000 # 7 days in milliseconds

mfa:
  app:
    name: MFA-DEMO

#using this "openssl rand -base64 32" command create encryption-key
app:
  security:
    encryption-key: SSV4zD6S6IbfHuQO1k+SZrrVWfuuIJIANTpMnRRJp5g=
    # 128/192/256-bit AES key, Base64-encoded
  mfaTokenExpiration: 300000 # 5 minutes in milliseconds
